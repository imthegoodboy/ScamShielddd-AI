name: ScamShield Anna Publish

on:
  workflow_dispatch:
    inputs:
      lifecycle:
        description: "validate only, push draft, cut immutable version, or release"
        type: choice
        default: validate
        options:
          - validate
          - push
          - cut
          - release
      version:
        description: "Anna app version to cut or release"
        type: string
        default: "0.1.5"

permissions:
  contents: read

concurrency:
  group: scamshield-anna-publish
  cancel-in-progress: false

env:
  ANNA_APP_HOST: ${{ vars.ANNA_APP_HOST || 'https://anna.partners' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Unit and static tests
        run: npm run test

      - name: Anna fixture verification
        run: npm run fixture:verify

      - name: Anna strict validation
        run: npm run validate

      - name: Browser QA
        run: npm run test:e2e

      - name: Check Anna publish token
        if: ${{ inputs.lifecycle != 'validate' }}
        env:
          ANNA_APP_PAT: ${{ secrets.ANNA_APP_PAT }}
        run: |
          if [ -z "$ANNA_APP_PAT" ]; then
            echo "::error::Set repository secret ANNA_APP_PAT before publishing."
            exit 1
          fi

      - name: Push app draft
        if: ${{ inputs.lifecycle == 'push' || inputs.lifecycle == 'cut' || inputs.lifecycle == 'release' }}
        env:
          ANNA_APP_PAT: ${{ secrets.ANNA_APP_PAT }}
          API_TOKEN: ${{ secrets.ANNA_APP_PAT }}
        run: npx --no-install anna-app apps push --account "$ANNA_APP_HOST" --json

      - name: Cut immutable version
        if: ${{ inputs.lifecycle == 'cut' || inputs.lifecycle == 'release' }}
        env:
          ANNA_APP_PAT: ${{ secrets.ANNA_APP_PAT }}
          API_TOKEN: ${{ secrets.ANNA_APP_PAT }}
        run: npx --no-install anna-app apps cut "${{ inputs.version }}" --account "$ANNA_APP_HOST" --json

      - name: Release version
        if: ${{ inputs.lifecycle == 'release' }}
        env:
          ANNA_APP_PAT: ${{ secrets.ANNA_APP_PAT }}
          API_TOKEN: ${{ secrets.ANNA_APP_PAT }}
        run: npx --no-install anna-app apps release "${{ inputs.version }}" --account "$ANNA_APP_HOST" --json
