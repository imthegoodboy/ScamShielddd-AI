name: ScamShield Release Artifact

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: npm ci
      - run: npm run test
      - run: npm run fixture:verify
      - run: npm run validate

      - name: Create Anna app source archive
        run: |
          tag="${GITHUB_REF_NAME:-manual}"
          mkdir -p dist-anna
          tar czf "dist-anna/scamshield-ai-${tag}.tar.gz" \
            app.json \
            manifest.json \
            package.json \
            package-lock.json \
            README.md \
            DEPLOY.md \
            bundle \
            executas \
            fixtures \
            tests \
            playwright.config.js \
            vitest.config.js \
            tokens.css

      - uses: actions/upload-artifact@v4
        with:
          name: scamshield-ai-anna-app
          path: dist-anna/*.tar.gz

      - name: Attach archive to GitHub release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist-anna/*.tar.gz
